services:
  job-management-api:
    image: ${DOCKERHUB_NAMESPACE:-gschimmel}/${STREAMMUX_API_IMAGE_NAME:-streammux-job-management-api}:${STREAMMUX_IMAGE_TAG:-latest}
    pull_policy: always
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:?set KAFKA_BOOTSTRAP_SERVERS}
      STREAMMUX_API_USERNAME: ${STREAMMUX_API_USERNAME:-streammux}
      STREAMMUX_API_PASSWORD: ${STREAMMUX_API_PASSWORD:-change-me-now}
      STREAMMUX_TOPIC_JOB_DEFINITIONS: ${STREAMMUX_TOPIC_JOB_DEFINITIONS:-job-definitions}
      STREAMMUX_TOPIC_JOB_LEASES: ${STREAMMUX_TOPIC_JOB_LEASES:-job-leases}
      STREAMMUX_TOPIC_JOB_STATUS: ${STREAMMUX_TOPIC_JOB_STATUS:-job-status}
      STREAMMUX_TOPIC_JOB_EVENTS: ${STREAMMUX_TOPIC_JOB_EVENTS:-job-events}
      STREAMMUX_TOPIC_JOB_COMMANDS: ${STREAMMUX_TOPIC_JOB_COMMANDS:-job-commands}
      STREAMMUX_ALLOWED_INPUT_TOPICS: ${STREAMMUX_ALLOWED_INPUT_TOPICS:-}
      STREAMMUX_ALLOWED_INPUT_TOPIC_PREFIXES: ${STREAMMUX_ALLOWED_INPUT_TOPIC_PREFIXES:-}
      STREAMMUX_ALLOWED_OUTPUT_TOPICS: ${STREAMMUX_ALLOWED_OUTPUT_TOPICS:-}
      STREAMMUX_ALLOWED_OUTPUT_TOPIC_PREFIXES: ${STREAMMUX_ALLOWED_OUTPUT_TOPIC_PREFIXES:-}
    ports:
      - "${JOB_MANAGEMENT_API_PORT:-8080}:8080"
    restart: unless-stopped

  job-catalog-api:
    image: ${DOCKERHUB_NAMESPACE:-gschimmel}/${STREAMMUX_CATALOG_IMAGE_NAME:-streammux-job-catalog-api}:${STREAMMUX_IMAGE_TAG:-latest}
    pull_policy: always
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:?set KAFKA_BOOTSTRAP_SERVERS}
      STREAMMUX_TOPIC_JOB_CATALOG: ${STREAMMUX_TOPIC_JOB_CATALOG:-job-catalog-entries}
      JOB_MANAGEMENT_API_URL: http://job-management-api:8080
    depends_on:
      - job-management-api
    restart: unless-stopped

  web-ui:
    image: ${DOCKERHUB_NAMESPACE:-gschimmel}/${STREAMMUX_WEB_IMAGE_NAME:-streammux-web-ui}:${STREAMMUX_IMAGE_TAG:-latest}
    pull_policy: always
    ports:
      - "${STREAMMUX_WEB_PORT:-8088}:80"
    environment:
      STREAMMUX_JOB_MANAGEMENT_API: ${STREAMMUX_JOB_MANAGEMENT_API_UPSTREAM:-job-management-api:8080}
      STREAMMUX_JOB_CATALOG_API: ${STREAMMUX_JOB_CATALOG_API_UPSTREAM:-job-catalog-api:3000}
    depends_on:
      - job-management-api
      - job-catalog-api
    restart: unless-stopped

  site-orchestrator:
    image: ${DOCKERHUB_NAMESPACE:-gschimmel}/${STREAMMUX_ORCH_IMAGE_NAME:-streammux-site-orchestrator}:${STREAMMUX_IMAGE_TAG:-latest}
    pull_policy: always
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:?set KAFKA_BOOTSTRAP_SERVERS}
      STREAMMUX_SITE_ID: ${STREAMMUX_SITE_ID:-site-a}
      STREAMMUX_INSTANCE_ID: ${STREAMMUX_INSTANCE_ID:-orchestrator-1}
      STREAMMUX_TOPIC_JOB_DEFINITIONS: ${STREAMMUX_TOPIC_JOB_DEFINITIONS:-job-definitions}
      STREAMMUX_TOPIC_JOB_LEASES: ${STREAMMUX_TOPIC_JOB_LEASES:-job-leases}
      STREAMMUX_TOPIC_JOB_STATUS: ${STREAMMUX_TOPIC_JOB_STATUS:-job-status}
      STREAMMUX_TOPIC_JOB_EVENTS: ${STREAMMUX_TOPIC_JOB_EVENTS:-job-events}
      STREAMMUX_TOPIC_JOB_COMMANDS: ${STREAMMUX_TOPIC_JOB_COMMANDS:-job-commands}
    restart: unless-stopped
    depends_on:
      - job-management-api


networks:
  traefik:
    external: true
    name: traefik-net
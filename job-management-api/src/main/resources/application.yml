server:
  forward-headers-strategy: framework

spring:
  application:
    name: job-management-api
  security:
    user:
      name: ${STREAMMUX_API_USERNAME:streammux}
      password: ${STREAMMUX_API_PASSWORD:change-me-now}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    consumer:
      group-id: ${STREAMMUX_API_CONSUMER_GROUP:job-management-api-read-model-${random.uuid}}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.ByteArrayDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  show-actuator: true
  swagger-ui:
    # Swagger UI’s upstream default URL is petstore; disable it so direct hits to
    # /swagger-ui/index.html don’t show Petstore when configUrl isn’t applied.
    disable-swagger-default-url: true
    url: /v3/api-docs
    operationsSorter: method
    tagsSorter: alpha

streammux:
  topics:
    job-definitions: ${STREAMMUX_TOPIC_JOB_DEFINITIONS}
    job-leases: ${STREAMMUX_TOPIC_JOB_LEASES}
    job-status: ${STREAMMUX_TOPIC_JOB_STATUS}
    job-events: ${STREAMMUX_TOPIC_JOB_EVENTS}
    job-commands: ${STREAMMUX_TOPIC_JOB_COMMANDS}
  validation:
    topics:
      allowed-input-topics: ${STREAMMUX_ALLOWED_INPUT_TOPICS:}
      allowed-input-topic-prefixes: ${STREAMMUX_ALLOWED_INPUT_TOPIC_PREFIXES:}
      allowed-output-topics: ${STREAMMUX_ALLOWED_OUTPUT_TOPICS:}
      allowed-output-topic-prefixes: ${STREAMMUX_ALLOWED_OUTPUT_TOPIC_PREFIXES:}

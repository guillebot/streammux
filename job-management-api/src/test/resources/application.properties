# Slice tests load springdoc on the classpath; disable serving docs in tests.
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# Required settings (no defaults in main application.yml)
KAFKA_BOOTSTRAP_SERVERS=127.0.0.1:9092
STREAMMUX_TOPIC_JOB_DEFINITIONS=test-job-definitions
STREAMMUX_TOPIC_JOB_LEASES=test-job-leases
STREAMMUX_TOPIC_JOB_STATUS=test-job-status
STREAMMUX_TOPIC_JOB_EVENTS=test-job-events
STREAMMUX_TOPIC_JOB_COMMANDS=test-job-commands

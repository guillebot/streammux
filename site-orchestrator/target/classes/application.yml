spring:
  application:
    name: site-orchestrator
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

streammux:
  site:
    site-id: ${STREAMMUX_SITE_ID:site-a}
    instance-id: ${STREAMMUX_INSTANCE_ID:orchestrator-1}
